<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Body Map</title>
  <meta name="description" content="Body Map — tango, salsa, bachata and kizomba socials, marathons, festivals and classes on one map.">

  <!-- Leaflet 1.9.4, pinned (unpkg). URLs verified reachable at build time. -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">
  <script
    defer
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/main.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-row">
      <h1 class="brand">Body Map</h1>
      <nav id="tabs" class="tabs" aria-label="Categories"></nav>
    </div>
    <div class="datebar">
      <button id="today-pill" class="today-pill" type="button">Today</button>
      <div id="datestrip" class="datestrip" role="group" aria-label="Dates"></div>
    </div>
  </header>

  <main class="map-wrap">
    <div id="map" role="application" aria-label="Map of social dance entities"></div>
    <div id="dance-switcher" class="dance-switcher"></div>
  </main>

  <div id="updated-chip" class="updated-chip" hidden></div>
</body>
</html>
